<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#E60012">
<title>PackageIQ</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F4F6;--card:#FFFFFF;--text:#111111;--muted:#6B7280;--border:#E5E7EB;
  --red:#E60012;--red-soft:#FEE2E2;--gold:#E8A400;--gold-soft:#FFF3C4;
  --green:#138A43;--gray:#9CA3AF;--blue:#2563EB;
  --shadow:0 1px 3px rgba(17,17,17,.06),0 1px 2px rgba(17,17,17,.04);--radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#d8dadf;color:var(--text);-webkit-font-smoothing:antialiased;}
#phone{position:relative;width:100%;max-width:440px;margin:0 auto;min-height:100vh;
  background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}
@media(min-width:480px){
  body{padding:24px 0;}
  #phone{min-height:auto;height:calc(100vh - 48px);max-height:920px;border-radius:38px;
    box-shadow:0 30px 70px rgba(0,0,0,.35);border:10px solid #111;overflow:hidden;}
}
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px;}
#scroll::-webkit-scrollbar{width:0;}
.hdr{display:flex;align-items:center;gap:12px;padding:18px 18px 10px;background:var(--bg);position:sticky;top:0;z-index:5;}
.hdr-title{flex:1;text-align:center;font-weight:700;font-size:19px;}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--text);background:none;border:none;cursor:pointer;}
.icon-btn svg{width:24px;height:24px;}
.logo{font-size:23px;font-weight:800;letter-spacing:-.5px;}
.logo .iq{color:var(--red);}
.greeting-wrap{padding:2px 18px 14px;}
.greeting{font-weight:700;font-size:18px;}
.subtitle{color:var(--muted);font-size:13.5px;margin-top:2px;}
.bell{position:relative;}
.bell .badge{position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;background:var(--red);
  color:#fff;border-radius:8px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.section{padding:0 18px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;}
.row-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.muted{color:var(--muted);}
.flex{display:flex;}.between{justify-content:space-between;align-items:center;}
.viewall{color:var(--red);font-weight:600;font-size:13px;cursor:pointer;}
.hero{background:var(--red);color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;box-shadow:0 6px 18px rgba(230,0,18,.25);}
.hero .label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.92;}
.hero .big{font-size:46px;font-weight:800;line-height:1;margin:6px 0 2px;}
.hero .goal{font-size:13px;opacity:.9;font-weight:500;}
.hero .status{margin-top:12px;font-size:13.5px;font-weight:600;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.kpi{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px;display:flex;align-items:center;gap:11px;}
.kpi .ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.kpi .ic svg{width:18px;height:18px;}
.kpi .val{font-size:19px;font-weight:700;line-height:1.1;}
.kpi .lab{font-size:11.5px;color:var(--muted);}
.ic-red{background:var(--red-soft);color:var(--red);}
.ic-blue{background:#DBEAFE;color:var(--blue);}
.ic-gold{background:var(--gold-soft);color:var(--gold);}
.mtd{background:var(--gold-soft);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.mtd .num{font-size:30px;font-weight:800;line-height:1;}
.mtd .goal{font-size:13px;color:#7a5b00;font-weight:500;}
.bar{height:9px;background:#fff;border-radius:6px;overflow:hidden;margin:12px 0 8px;border:1px solid rgba(0,0,0,.05);}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:6px;}
.mtd .behind{color:var(--red);font-weight:600;font-size:13px;}
.att-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--border);cursor:pointer;}
.att-row:first-of-type{border-top:none;}
.att-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.att-ic svg{width:19px;height:19px;}
.att-title{font-weight:600;font-size:14px;}
.att-sub{font-size:12.5px;color:var(--muted);margin-top:1px;}
.chev{color:var(--gray);margin-left:auto;}.chev svg{width:18px;height:18px;}
.redbar-head{background:var(--red);color:#fff;font-size:12px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;padding:11px 16px;border-radius:14px 14px 0 0;}
.rank-card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--border);cursor:pointer;}
.rank-row:first-child{border-top:none;}
.rank-no{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex:0 0 auto;background:#F3F4F6;color:var(--muted);}
.rank-1{background:var(--gold);color:#fff;}.rank-2{background:#C0C7D0;color:#fff;}.rank-3{background:#B06A35;color:#fff;}
.rank-name{font-weight:600;font-size:14.5px;}
.rank-pk{font-size:12.5px;color:var(--muted);}
.rank-track{flex:1;height:7px;background:#EEF0F3;border-radius:5px;overflow:hidden;margin-left:6px;max-width:120px;}
.rank-track>span{display:block;height:100%;border-radius:5px;background:var(--red);}
.rank-track.warn>span{background:var(--gold);}
.tabs{display:flex;gap:26px;padding:6px 18px 0;justify-content:center;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:64px;z-index:4;}
.tab{padding:8px 2px 12px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;}
.tab.active{color:var(--red);border-color:var(--red);}
.tbl-head,.tbl-row{display:grid;grid-template-columns:1.7fr .7fr 1fr .9fr;align-items:center;gap:6px;}
.tbl-head{padding:10px 4px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.tbl-row{padding:11px 4px;border-top:1px solid var(--border);cursor:pointer;}
.tbl-row .dn{display:flex;align-items:center;gap:9px;font-weight:600;font-size:13.5px;}
.tbl-row .dn svg{width:18px;height:18px;color:var(--gray);flex:0 0 auto;}
.tbl-row .c{font-size:13px;}.tbl-row .c.r{text-align:right;}
.tbl-num{text-align:center;font-weight:600;}
.total-red{background:var(--red);color:#fff;border-radius:var(--radius);padding:16px;display:grid;
  grid-template-columns:repeat(3,1fr);text-align:center;box-shadow:0 6px 18px rgba(230,0,18,.22);margin-bottom:14px;}
.total-red .tv{font-size:21px;font-weight:800;}
.total-red .tl{font-size:11px;opacity:.9;font-weight:600;margin-top:2px;}
.total-red .sep{border-left:1px solid rgba(255,255,255,.3);}
.btn-link{display:flex;align-items:center;justify-content:space-between;background:var(--card);
  border-radius:14px;box-shadow:var(--shadow);padding:15px 18px;color:var(--red);font-weight:600;font-size:14px;cursor:pointer;margin-bottom:14px;}
.btn-link svg{width:18px;height:18px;}
.pill{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
  border-radius:999px;padding:9px 16px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);}
.pill svg{width:15px;height:15px;color:var(--muted);}
.center{text-align:center;}
.uph-month{background:var(--gold-soft);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.uph-month .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end;}
.uph-month .v{font-size:26px;font-weight:800;line-height:1;}
.uph-month .l{font-size:12px;color:#7a5b00;font-weight:500;margin-top:3px;}
.entry{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--border);font-size:13px;}
.entry:first-of-type{border-top:none;}
.entry .date{color:var(--muted);font-size:11.5px;width:46px;flex:0 0 auto;}
.entry .desc{font-weight:600;flex:1;}
.entry .amt{font-weight:600;}
.entry .pk{color:var(--muted);font-size:12px;width:62px;text-align:right;flex:0 0 auto;}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:4px 0 14px;}
.cal-nav .mo{font-weight:700;font-size:15px;min-width:120px;text-align:center;}
.cal-nav .icon-btn{background:var(--card);border-radius:10px;box-shadow:var(--shadow);width:38px;height:38px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;letter-spacing:.03em;}
.cal-cell{aspect-ratio:1/1.05;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:11px;cursor:pointer;position:relative;gap:2px;}
.cal-cell.dim{color:var(--gray);}
.cal-cell .dn{font-size:13px;font-weight:600;}
.cal-cell .pk{font-size:9.5px;color:var(--muted);line-height:1;}
.cal-cell .dot{width:6px;height:6px;border-radius:50%;}
.dot-green{background:var(--green);}.dot-gold{background:var(--gold);}.dot-red{background:var(--red);}.dot-gray{background:var(--gray);}
.cal-cell.today{background:var(--red);color:#fff;}
.cal-cell.today .dn{font-size:18px;font-weight:800;}
.cal-cell.today .pk,.cal-cell.today .dot{display:none;}
.legend{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;padding:14px 2px 4px;}
.legend .li{display:flex;align-items:center;gap:7px;font-size:12px;}
.legend .li .dot{width:9px;height:9px;border-radius:50%;}
.daily-notes{font-size:13.5px;line-height:1.5;}
.list-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.list-row{display:flex;align-items:center;gap:14px;padding:15px 18px;border-top:1px solid var(--border);cursor:pointer;}
.list-row:first-child{border-top:none;}
.list-ic{width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--red);flex:0 0 auto;}
.list-ic svg{width:21px;height:21px;}
.list-name{font-weight:600;font-size:14.5px;flex:1;}
.list-val{color:var(--muted);font-size:13.5px;margin-right:6px;}
.subhead{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:6px 4px 8px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stat{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px 10px;text-align:center;}
.stat .v{font-size:21px;font-weight:800;}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.act-row{display:flex;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--border);font-size:13px;}
.act-row:first-of-type{border-top:none;}
.act-row .a-main{font-weight:600;}
.act-row .a-sub{color:var(--muted);font-size:12px;margin-top:1px;}
.act-row .a-pk{font-weight:700;white-space:nowrap;}
#nav{position:absolute;left:0;right:0;bottom:0;display:flex;background:#fff;border-top:1px solid var(--border);
  padding:8px 2px calc(8px + env(safe-area-inset-bottom));z-index:10;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray);cursor:pointer;
  font-size:9.5px;font-weight:600;background:none;border:none;font-family:inherit;padding:2px 0;}
.nav-item svg{width:22px;height:22px;}
.nav-item.active{color:var(--red);}
.fade{animation:fade .22s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.updated{text-align:center;font-size:11px;color:var(--gray);padding:4px 0 10px;}
.banner{margin:0 18px 12px;padding:11px 14px;border-radius:12px;font-size:12.5px;font-weight:600;}
.banner.warn{background:var(--gold-soft);color:#7a5b00;}
.banner.err{background:var(--red-soft);color:var(--red);}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
</style>
</head>
<body>
<div id="phone"><div id="scroll"></div><nav id="nav"></nav></div>
<script>
/* ============================================================
   PackageIQ app. Paste your Apps Script /exec URL into API_URL.
   ============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbx1ieXPg4Twfnq17hkxyhYtC4FC-A-bzITa8dHt2NVxC92ktpKZBdPiWShLsILMUtA/exec"; // <-- paste the Web app /exec URL here

const state = {
  screen:"dashboard", detail:null,
  techPeriod:"today", dealerPeriod:"today", detailPeriod:"today",
  calY:null, calM:null, calSelected:null,
  data:null, mode:"demo", updated:""
};

/* ---- tiny demo so the file opens before it's wired ---- */
const DEMO = {
  config:{packageValue:50,dailyGoal:150,monthlyGoal:3300,companyName:"PackageIQ",managerName:"Manager"},
  dashboard:{todayKey:"2026-06-03",yesterdayKey:"2026-06-02",todayPackages:139,todayGross:13720,todayNet:7375,
    yesterdayPackages:140,weekPackages:289,monthPackages:289,dailyGoal:150,monthlyGoal:3300,
    weekTrend:[0,0,0,0,9,140,139],
    attention:[{type:"nolog",title:"Demo data — not connected",sub:"Paste your /exec URL into API_URL"}]},
  techs:[{name:"Jeremy",today:{pk:18,gross:1100,net:550},week:{pk:34,gross:2100,net:1050},month:{pk:34,gross:2100,net:1050}},
    {name:"Chase",today:{pk:16,gross:980,net:490},week:{pk:30,gross:1800,net:900},month:{pk:30,gross:1800,net:900}}],
  dealers:[{name:"Henna Chevrolet",today:{pk:20,gross:1400,net:1100},week:{pk:40,gross:2800,net:2200},month:{pk:40,gross:2800,net:2200}}],
  upholstery:{todayRevenue:0,todayEquiv:0,monthRevenue:0,monthEquiv:0,revenueTrend:[0,0,0,0,0,0,0],monthBars:[0,0,0,0,0,0,0],entries:[]},
  calendar:{"2026-06-01":9,"2026-06-02":140,"2026-06-03":139},
  dailyNotes:{"2026-06-03":"Demo note."},activity:{},dealerActivity:{}
};

async function loadData(){
  if(API_URL){
    try{
      const r=await fetch(API_URL,{redirect:"follow"});
      if(r.ok){ const j=await r.json(); localStorage.setItem("piq_cache",JSON.stringify(j)); return {data:j,mode:"live"}; }
    }catch(e){}
    const c=localStorage.getItem("piq_cache");
    if(c) return {data:JSON.parse(c),mode:"cache"};
    return {data:DEMO,mode:"error"};
  }
  return {data:DEMO,mode:"demo"};
}

/* ---- helpers ---- */
const $=s=>document.querySelector(s);
const money=n=>"$"+Math.round(Number(n)||0).toLocaleString();
const pct=(a,b)=>b?Math.round((a/b)*100):0;
const PER=["today","week","month"];
function statusOf(p,goal){ if(p==null)return"gray"; if(!goal)return"gray"; const r=p/goal; if(r>=1)return"green"; if(r>=0.8)return"gold"; return"red"; }

function donut(p,{size=72,stroke=8,track="#EEF0F3",color="var(--red)",txt="var(--text)"}={}){
  const r=(size-stroke)/2,c=2*Math.PI*r,off=c*(1-Math.min(p/100,1));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="50%" dy="0.35em" text-anchor="middle" font-size="${size*0.26}" font-weight="800" fill="${txt}">${p}%</text></svg>`;
}
function spark(vals,{w=230,h=64,color="var(--red)"}={}){
  if(!vals||!vals.length) vals=[0,0];
  const max=Math.max(...vals),min=Math.min(...vals),span=(max-min)||1,step=w/(vals.length-1);
  const pts=vals.map((v,i)=>[i*step,h-6-((v-min)/span)*(h-14)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const id="g"+Math.random().toString(36).slice(2,7);
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="${color}" stop-opacity=".22"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${line} L ${w} ${h} L 0 ${h} Z" fill="url(#${id})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function bars(vals,{w=300,h=70,color="var(--gold)"}={}){
  if(!vals||!vals.length) vals=[0];
  const max=Math.max(...vals)||1,n=vals.length,gap=3,bw=(w-gap*(n-1))/n;
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`+
    vals.map((v,i)=>{const bh=(v/max)*(h-6);return `<rect x="${(i*(bw+gap)).toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${color}"/>`;}).join("")+`</svg>`;
}
const I={
  menu:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>',
  bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 003.4 0"/></svg>',
  filter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>',
  dollar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
  wallet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4z"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-6"/></svg>',
  user:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>',
  users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 21a6.5 6.5 0 0113 0"/><path d="M16 5.5a3.5 3.5 0 010 7M22 21a6.5 6.5 0 00-5-6.3"/></svg>',

const DOW=["SUN","MON","TUE","WED","THU","FRI","SAT"];
function screenCalendar(){
  const d=state.data,db=d.dashboard,y=state.calY,m=state.calM;
  const first=new Date(y,m,1),startDow=first.getDay(),dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  const pad=n=>("0"+n).slice(-2);
  let cells=[];
  for(let i=startDow-1;i>=0;i--){const dn=prev-i;cells.push({dn,key:`${y}-${pad(m===0?12:m)}-${pad(dn)}`,dim:true});}
  for(let dn=1;dn<=dim;dn++) cells.push({dn,key:`${y}-${pad(m+1)}-${pad(dn)}`,dim:false});
  while(cells.length%7) cells.push({dn:"",key:null,dim:true});
  const prefix=`${y}-${pad(m+1)}`;
  let monthTotal=0; Object.keys(d.calendar).forEach(k=>{if(k.slice(0,7)===prefix)monthTotal+=d.calendar[k];});
  const mp=pct(monthTotal,db.monthlyGoal),bM=db.monthlyGoal-monthTotal;
  const note=d.dailyNotes[state.calSelected];
  const grid=cells.map(c=>{
    if(c.dn==="")return`<div></div>`;
    const p=d.calendar[c.key],isToday=c.key===db.todayKey,st=statusOf(p,db.dailyGoal);
    return`<div class="cal-cell ${c.dim?'dim':''} ${isToday?'today':''}" ${p!=null?`data-action="day" data-arg="${c.key}"`:''}>
      <span class="dn">${c.dn}</span>${p!=null?`<span class="pk">${p}</span><span class="dot dot-${st}"></span>`:""}</div>`;
  }).join("");
  const label=new Date(y,m,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  return topHeader("Calendar",I.cal)+`<div class="section" style="padding-top:4px;">
    <div class="cal-nav"><button class="icon-btn" data-action="calPrev">${I.chevL}</button>
      <span class="mo">${label}</span><button class="icon-btn" data-action="calNext">${I.chevR}</button></div>

      <div class="li"><span class="dot dot-green"></span>On Track (100%+)</div>
      <div class="li"><span class="dot dot-gold"></span>At Risk (80-99%)</div>

      <div class="li"><span class="dot dot-gray"></span>No Data</div></div>
    <div class="card" style="margin-top:8px;"><div class="row-label">Monthly Summary</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-top:4px;">
        <span style="font-size:28px;font-weight:800;">${Math.round(monthTotal).toLocaleString()}</span>
        <span class="muted" style="font-size:13px;">/ ${db.monthlyGoal.toLocaleString()} Goal</span>
        <span style="margin-left:auto;font-weight:700;">${mp}%</span></div>
      <div class="bar"><span style="width:${Math.min(mp,100)}%"></span></div>
      <div style="color:var(--red);font-weight:600;font-size:13px;">${bM>0?`Behind by ${Math.round(bM).toLocaleString()} pkgs`:`Ahead by ${Math.round(-bM).toLocaleString()} pkgs`}</div></div>
    <div class="card"><div class="flex between" style="margin-bottom:6px;">
        <span class="row-label">Daily Notes</span><span style="color:var(--gray)">${I.edit}</span></div>
      <div class="daily-notes">${note||"No notes for the selected day."}</div></div></div>`;
}

      <div class="kpi"><div class="ic ic-red">${I.wallet}</div><div><div class="val">${money(net)}</div><div class="lab">Net${isToday?"":" (est)"}</div></div></div></div>
    <div class="card"><div class="row-label" style="margin-bottom:6px;">Daily Notes</div>
      <div class="daily-notes">${note||"No notes recorded for this day."}</div></div></div>`;
}

/* ---- nav + render ---- */
const NAV=[{id:"dashboard",label:"Dashboard",ic:I.home},{id:"techs",label:"Techs",ic:I.user},
  {id:"dealers",label:"Dealers",ic:I.clipboard},{id:"upholstery",label:"Upholstery",ic:I.seat},
  {id:"calendar",label:"Calendar",ic:I.cal},{id:"more",label:"More",ic:I.dots}];
function renderNav(){
  const active=state.detail?(state.detail.parent||state.screen):state.screen;
  $("#nav").innerHTML=NAV.map(n=>`<button class="nav-item ${active===n.id?'active':''}" data-action="screen" data-arg="${n.id}">${n.ic}<span>${n.label}</span></button>`).join("");
}
function renderBody(){
  if(state.detail){
    if(state.detail.type==="tech")return detailTech(state.detail.id);
    if(state.detail.type==="dealer")return detailDealer(state.detail.id);
    if(state.detail.type==="day")return detailDay(state.detail.id);
  }
  switch(state.screen){
    case"dashboard":return screenDashboard();
    case"techs":return screenTechs();
    case"dealers":return screenDealers();
    case"upholstery":return screenUpholstery();
    case"calendar":return screenCalendar();
    case"more":return screenMore();
  }
}
function render(){const s=$("#scroll");s.innerHTML=`<div class="fade">${renderBody()}</div>`;s.scrollTop=0;renderNav();}

document.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]");if(!el)return;
  const a=el.dataset.action,arg=el.dataset.arg;
  switch(a){
    case"screen":state.screen=arg;state.detail=null;render();break;
    case"tech":state.detail={type:"tech",id:arg,parent:"techs"};render();break;
    case"dealer":state.detailPeriod="today";state.detail={type:"dealer",id:arg,parent:"dealers"};render();break;
    case"day":state.calSelected=arg;state.detail={type:"day",id:arg,parent:"calendar"};render();break;
    case"back":state.detail=null;render();break;
    case"techPeriod":state.techPeriod=arg;render();break;
    case"dealerPeriod":state.dealerPeriod=arg;render();break;
    case"detailPeriod":state.detailPeriod=arg;render();break;
    case"calPrev":state.calM--;if(state.calM<0){state.calM=11;state.calY--;}render();break;
    case"calNext":state.calM++;if(state.calM>11){state.calM=0;state.calY++;}render();break;
    case"refresh":boot();break;
    case"noop":break;
  }
});

async function boot(){
  const res=await loadData();
  state.data=res.data;state.mode=res.mode;
  state.updated=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  const tk=(state.data.dashboard.todayKey||"").slice(0,10);
  const ref=tk?new Date(tk+"T00:00:00"):new Date();
  if(state.calY===null){state.calY=ref.getFullYear();state.calM=ref.getMonth();state.calSelected=tk||null;}
  render();
}
boot();
setInterval(boot,60000);

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
