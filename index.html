<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#E60012" />
<title>PackageIQ</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#F3F4F6;
  --card:#FFFFFF;
  --text:#111111;
  --muted:#6B7280;
  --border:#E5E7EB;
  --red:#E60012;
  --red-soft:#FEE2E2;
  --gold:#E8A400;
  --gold-soft:#FFF3C4;
  --green:#138A43;
  --gray:#9CA3AF;
  --blue:#2563EB;
  --shadow:0 1px 3px rgba(17,17,17,.07),0 1px 2px rgba(17,17,17,.04);
  --radius:18px;
}

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { margin:0; padding:0; min-height:100%; }
body {
  font-family:'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background:#d8dadf;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

#phone {
  position:relative;
  width:100%;
  max-width:440px;
  margin:0 auto;
  min-height:100vh;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

@media (min-width:480px) {
  body { padding:24px 0; }
  #phone {
    height:calc(100vh - 48px);
    max-height:920px;
    min-height:auto;
    border-radius:38px;
    border:10px solid #111;
    box-shadow:0 30px 70px rgba(0,0,0,.35);
  }
}

#scroll {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:92px;
}
#scroll::-webkit-scrollbar { width:0; }

.hdr {
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px 18px 10px;
  background:var(--bg);
  position:sticky;
  top:0;
  z-index:5;
}
.logo {
  flex:1;
  text-align:left;
  font-size:23px;
  font-weight:800;
  letter-spacing:-.5px;
}
.logo .iq { color:var(--red); }
.hdr-title {
  flex:1;
  text-align:center;
  font-weight:700;
  font-size:19px;
}
.icon-btn {
  width:36px;
  height:36px;
  border:0;
  background:var(--card);
  color:var(--text);
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow);
  cursor:pointer;
}
.icon-btn.ghost {
  background:transparent;
  box-shadow:none;
}
.icon-btn svg { width:21px; height:21px; }

.bell { position:relative; }
.bell .badge {
  position:absolute;
  top:-4px;
  right:-4px;
  min-width:17px;
  height:17px;
  background:var(--red);
  color:#fff;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 4px;
}

.greeting-wrap { padding:2px 18px 14px; }
.greeting { font-weight:700; font-size:18px; }
.subtitle { color:var(--muted); font-size:13.5px; margin-top:2px; }

.section { padding:0 18px; }
.card {
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  margin-bottom:14px;
}
.row-label {
  font-size:11px;
  font-weight:800;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
}
.muted { color:var(--muted); }
.flex { display:flex; }
.between { justify-content:space-between; align-items:center; }
.viewall { color:var(--red); font-weight:700; font-size:13px; cursor:pointer; }
.empty { text-align:center; color:var(--muted); font-size:13px; padding:28px 0; }

.hero {
  background:var(--red);
  color:#fff;
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 6px 18px rgba(230,0,18,.25);
}
.hero .label {
  font-size:11px;
  font-weight:800;
  letter-spacing:.06em;
  text-transform:uppercase;
  opacity:.92;
}
.hero .big {
  font-size:46px;
  font-weight:800;
  line-height:1;
  margin:6px 0 2px;
}
.hero .goal { font-size:13px; opacity:.9; font-weight:500; }
.hero .status { margin-top:12px; font-size:13.5px; font-weight:700; }

.kpi-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:14px;
}
.kpi {
  background:var(--card);
  border-radius:16px;
  box-shadow:var(--shadow);
  padding:14px;
  display:flex;
  align-items:center;
  gap:11px;
}
.kpi .ic {
  width:34px;
  height:34px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}
.kpi .ic svg { width:18px; height:18px; }
.kpi .val { font-size:19px; font-weight:800; line-height:1.1; }
.kpi .lab { font-size:11.5px; color:var(--muted); margin-top:2px; }
.ic-red { background:var(--red-soft); color:var(--red); }
.ic-blue { background:#DBEAFE; color:var(--blue); }
.ic-gold { background:var(--gold-soft); color:var(--gold); }

.mtd {
  background:var(--gold-soft);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:14px;
}
.mtd .num { font-size:30px; font-weight:800; line-height:1; }
.mtd .goal { font-size:13px; color:#7a5b00; font-weight:600; }
.mtd .behind { color:var(--red); font-weight:700; font-size:13px; }

.bar {
  height:9px;
  background:#fff;
  border-radius:6px;
  overflow:hidden;
  margin:12px 0 8px;
  border:1px solid rgba(0,0,0,.05);
}
.bar > span {
  display:block;
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--gold));
  border-radius:6px;
}

.att-row {
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 0;
  border-top:1px solid var(--border);
}
.att-row:first-of-type { border-top:none; }
.att-ic {
  width:36px;
  height:36px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}
.att-title { font-weight:700; font-size:14px; }
.att-sub { font-size:12.5px; color:var(--muted); margin-top:1px; }

.tabs {
  display:flex;
  gap:24px;
  padding:6px 18px 0;
  justify-content:center;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;
  top:64px;
  z-index:4;
}
.tab {
  padding:8px 2px 12px;
  font-size:14px;
  font-weight:700;
  color:var(--muted);
  cursor:pointer;
  border-bottom:2.5px solid transparent;
}
.tab.active { color:var(--red); border-color:var(--red); }

.rank-card {
  background:var(--card);
  border-radius:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
  margin-bottom:14px;
}
.redbar-head {
  background:var(--red);
  color:#fff;
  font-size:12px;
  font-weight:800;
  letter-spacing:.05em;
  text-transform:uppercase;
  padding:11px 16px;
}
.rank-row {
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  border-top:1px solid var(--border);
  cursor:pointer;
}
.rank-row:first-child { border-top:none; }
.rank-no {
  width:30px;
  height:30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:13px;
  flex:0 0 auto;
  background:#F3F4F6;
  color:var(--muted);
}
.rank-1 { background:var(--gold); color:#fff; }
.rank-2 { background:#C0C7D0; color:#fff; }
.rank-3 { background:#B06A35; color:#fff; }
.rank-name { font-weight:700; font-size:14.5px; }
.rank-pk { font-size:12.5px; color:var(--muted); }
.rank-track {
  flex:1;
  height:7px;
  background:#EEF0F3;
  border-radius:5px;
  overflow:hidden;
  margin-left:6px;
  max-width:120px;
}
.rank-track > span {
  display:block;
  height:100%;
  background:var(--red);
  border-radius:5px;
}
.rank-track.warn > span { background:var(--gold); }

.tbl-head, .tbl-row {
  display:grid;
  grid-template-columns:1.7fr .7fr 1fr .9fr;
  align-items:center;
  gap:6px;
}
.tbl-head {
  padding:10px 4px;
  font-size:10.5px;
  font-weight:800;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:var(--muted);
}
.tbl-row {
  padding:12px 4px;
  border-top:1px solid var(--border);
  cursor:pointer;
}
.tbl-row .dn {
  display:flex;
  align-items:center;
  gap:9px;
  font-weight:700;
  font-size:13.5px;
}
.tbl-row .dn svg { width:18px; height:18px; color:var(--gray); flex:0 0 auto; }
.tbl-row .c { font-size:13px; }
.tbl-row .r { text-align:right; }
.tbl-num { text-align:center; font-weight:700; }

.total-red {
  background:var(--red);
  color:#fff;
  border-radius:var(--radius);
  padding:16px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  text-align:center;
  box-shadow:0 6px 18px rgba(230,0,18,.22);
  margin-bottom:14px;
}
.total-red .tv { font-size:21px; font-weight:800; }
.total-red .tl { font-size:11px; opacity:.9; font-weight:700; margin-top:2px; }
.total-red .sep { border-left:1px solid rgba(255,255,255,.3); }

.uph-month {
  background:var(--gold-soft);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:14px;
}
.uph-month .grid2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  align-items:end;
}
.uph-month .v { font-size:26px; font-weight:800; line-height:1; }
.uph-month .l { font-size:12px; color:#7a5b00; font-weight:600; margin-top:3px; }

.entry {
  display:flex;
  align-items:center;
  gap:10px;
  padding:11px 0;
  border-top:1px solid var(--border);
  font-size:13px;
}
.entry:first-of-type { border-top:none; }
.entry .date { color:var(--muted); font-size:11.5px; width:46px; flex:0 0 auto; }
.entry .desc { font-weight:700; flex:1; }
.entry .amt { font-weight:700; }
.entry .pk { color:var(--muted); font-size:12px; width:62px; text-align:right; flex:0 0 auto; }

.cal-nav {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:4px 0 14px;
}
.cal-nav .mo { font-weight:800; font-size:15px; min-width:130px; text-align:center; }

.cal-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.cal-dow {
  text-align:center;
  font-size:10px;
  font-weight:800;
  color:var(--muted);
  padding:4px 0;
}
.cal-cell {
  aspect-ratio:1/1.08;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:11px;
  cursor:pointer;
  gap:2px;
}
.cal-cell.dim { color:var(--gray); }
.cal-cell .dn { font-size:13px; font-weight:700; }
.cal-cell .pk { font-size:9.5px; color:var(--muted); line-height:1; }
.cal-cell .dot { width:6px; height:6px; border-radius:50%; }
.dot-green { background:var(--green); }
.dot-gold { background:var(--gold); }
.dot-red { background:var(--red); }
.dot-gray { background:var(--gray); }
.cal-cell.today {
  background:var(--red);
  color:#fff;
}
.cal-cell.today .pk { color:#fff; opacity:.9; }

.legend {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 14px;
  padding:14px 2px 4px;
}
.legend .li {
  display:flex;
  align-items:center;
  gap:7px;
  font-size:12px;
}
.legend .li .dot { width:9px; height:9px; border-radius:50%; }

.list-card {
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  margin-bottom:14px;
}
.list-row {
  display:flex;
  align-items:center;
  gap:14px;
  padding:15px 18px;
  border-top:1px solid var(--border);
}
.list-row:first-child { border-top:none; }
.list-ic {
  width:30px;
  height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--red);
  flex:0 0 auto;
}
.list-name { font-weight:700; font-size:14.5px; flex:1; }
.list-val { color:var(--muted); font-size:13.5px; margin-right:6px; }
.subhead {
  font-size:11px;
  font-weight:800;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
  padding:6px 4px 8px;
}

.stat-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:14px;
}
.stat {
  background:var(--card);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:14px 10px;
  text-align:center;
}
.stat .v { font-size:21px; font-weight:800; }
.stat .l { font-size:11px; color:var(--muted); margin-top:2px; }

.act-row {
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:11px 0;
  border-top:1px solid var(--border);
  font-size:13px;
}
.act-row:first-of-type { border-top:none; }
.act-row .a-main { font-weight:700; }
.act-row .a-sub { color:var(--muted); font-size:12px; margin-top:1px; }
.act-row .a-pk { font-weight:800; white-space:nowrap; }

.updated {
  text-align:center;
  font-size:11px;
  color:var(--gray);
  padding:4px 0 10px;
}
.banner {
  margin:0 18px 12px;
  padding:11px 14px;
  border-radius:12px;
  font-size:12.5px;
  font-weight:700;
}
.banner.warn { background:var(--gold-soft); color:#7a5b00; }
.banner.err { background:var(--red-soft); color:var(--red); }

#nav {
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  display:flex;
  background:#fff;
  border-top:1px solid var(--border);
  padding:8px 2px calc(8px + env(safe-area-inset-bottom));
  z-index:10;
}
.nav-item {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  color:var(--gray);
  cursor:pointer;
  font-size:9.5px;
  font-weight:700;
  background:none;
  border:none;
  font-family:inherit;
  padding:2px 0;
}
.nav-item svg { width:22px; height:22px; }
.nav-item.active { color:var(--red); }

.fade { animation:fade .22s ease; }
@keyframes fade {
  from { opacity:0; transform:translateY(4px); }
  to { opacity:1; transform:none; }
}
</style>
</head>

<body>
<div id="phone">
  <div id="scroll"></div>
  <nav id="nav"></nav>
</div>

<script>

</script>
<script src="app.js"></script>
</body>
</html>
